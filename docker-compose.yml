services:
  mongo:
    image: mongo:8.0
    container_name: mongo-db
    restart: unless-stopped
    user: "999:999"                # run as mongodb user inside the image
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD}"
      MONGO_RS_HOST: "${MONGO_RS_HOST:-mongo}"
    ports:
      - '127.0.0.1:${MONGO_RS_PORT:-27017}:27017'
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
      - ./scripts/mongo-init.sh:/usr/local/bin/mongo-init.sh:ro
    entrypoint: ["/usr/local/bin/mongo-init.sh"]
    networks:
      mongo-host-access:
        aliases:
          - mongo
      mongo-private: {}

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    networks:
      - mongo-private
      - cloudflare-egress
    restart: unless-stopped
    depends_on:
      - mongo

volumes:
  mongo-data:
  mongo-config:

networks:
  mongo-private:
    driver: bridge
    internal: true
  mongo-host-access:
    name: mongo-host-access
    driver: bridge
  cloudflare-egress:
    driver: bridge
